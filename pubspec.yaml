name: nomatch
description: Tap!Match - offline-first P2P split-screen game (no text/icons/sound).
publish_to: "none"
version: 1.0.7+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  sensors_plus: ^4.0.2
  torch_light: ^1.0.0
  shared_preferences: ^2.2.2
  shared_preferences_foundation: 2.4.0  # Fix for broken 2.5.6
  flutter_local_notifications: ^17.0.0
  wakelock_plus: ^1.2.0  # Ekranı açık tutmak için
  flutter_svg: ^2.0.0  # ✅ SVG logolar için
  flutter_blue_plus: ^1.32.12  # ✅ BLE cross-platform (iOS + Android)
  url_launcher: ^6.2.5  # ✅ WhatsApp ve Instagram linklerini açmak için
  flutter_native_splash: ^2.3.0  # ✅ Native splash screen (runtime için de)
  video_player: ^2.9.1  # ✅ Onboarding videoları (ilk açılışta bir kez)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# ✅ App icon configuration
flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/branding/icon.png"  # 1024x1024 PNG
  remove_alpha_ios: true  # iOS alfa desteklemez
  background_color_ios: "#191423"  # Ink Plum — şeffaf alanları bu renkle doldurur

# ✅ Native splash screen configuration
flutter_native_splash:
  image: assets/branding/logo.png   # Merkez logo (şeffaf PNG)
  color: "#191423"                   # Ink Plum arka plan
  ios: true
  android: false
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
    # assets/ui/ kaldırıldı: klasör boş ve git boş klasör takip etmez —
    # Codemagic'in temiz klonunda var olmayacağı için build'i kırıyordu.
    - assets/branding/
    - assets/onboarding/
