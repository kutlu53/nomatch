name: nomatch
description: NoMatch - offline-first P2P split-screen game (no text/icons/sound).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  sensors_plus: ^4.0.2
  torch_light: ^1.0.0
  shared_preferences: ^2.2.2
  shared_preferences_foundation: 2.4.0  # Fix for broken 2.5.6
  flutter_local_notifications: ^17.0.0
  wakelock_plus: ^1.2.0  # Ekranı açık tutmak için
  flutter_svg: ^2.0.0  # ✅ SVG logolar için
  flutter_blue_plus: ^1.32.12  # ✅ BLE cross-platform (iOS + Android)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.0  # ✅ Native splash screen

# ✅ Native splash screen configuration
flutter_native_splash:
  image: assets/branding/logo_full_screen.png
  color: "#1a1a2e"  # Fallback background (koyu lacivert)
  fullscreen: true
  android_12:
    image: assets/branding/logo_full_screen.png
    color: "#1a1a2e"

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
    - assets/ui/
    - assets/branding/
